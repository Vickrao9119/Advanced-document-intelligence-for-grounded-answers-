version: '3.8'

services:
  smartdocs-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdocs-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: python backend/app.py
    networks:
      - smartdocs-network

  smartdocs-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdocs-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    command: streamlit run src/app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - smartdocs-backend
    networks:
      - smartdocs-network

networks:
  smartdocs-network:
    driver: bridge
